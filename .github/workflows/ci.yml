name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - os: macos-14            # Apple Silicon runner
            rust-target: aarch64-apple-darwin
          - os: windows-2022
            rust-target: x86_64-pc-windows-msvc

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── system dependencies (Linux only) ────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── install JS dependencies ──────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── type-check frontend ──────────────────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── build frontend ───────────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build

      # ── build Rust backend (lib + binary, no bundling) ───────────────────────
      - name: Build Rust backend
        run: cargo build --manifest-path src-tauri/Cargo.toml
        env:
          # Prevent Tauri from trying to load a dev server during CI
          TAURI_SKIP_DEVSERVER_CHECK: true

      # ── Rust tests ───────────────────────────────────────────────────────────
      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
        env:
          TAURI_SKIP_DEVSERVER_CHECK: true

      # ── CLI smoke test ───────────────────────────────────────────────────────
      - name: CLI smoke test — help flag (Unix)
        if: runner.os != 'Windows'
        run: |
          ./src-tauri/target/debug/llmeter user --help
          ./src-tauri/target/debug/llmeter model --help
          ./src-tauri/target/debug/llmeter server --help

      - name: CLI smoke test — help flag (Windows)
        if: runner.os == 'Windows'
        run: |
          .\src-tauri\target\debug\llmeter.exe user --help
          .\src-tauri\target\debug\llmeter.exe model --help
          .\src-tauri\target\debug\llmeter.exe server --help

      # ── CLI rejects bad credentials ──────────────────────────────────────────
      - name: CLI smoke test — auth rejection (Unix)
        if: runner.os != 'Windows'
        run: |
          if ./src-tauri/target/debug/llmeter user list -u nobody -p wrong 2>/dev/null; then
            echo "Expected auth failure but command succeeded" && exit 1
          fi

      - name: CLI smoke test — auth rejection (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & .\src-tauri\target\debug\llmeter.exe user list -u nobody -p wrong 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Expected auth failure but command succeeded"
            exit 1
          }
          exit 0

  # ── Draft release (push to main only) ────────────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const sha     = context.sha.slice(0, 7);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:   `v${version}-${sha}`,
              name:       `LLMeter v${version}`,
              body:       `Draft release built from ${context.sha}`,
              draft:      true,
              prerelease: false,
            });
            core.setOutput('release_id', String(data.id));

  tauri-release:
    name: Tauri release — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    if: github.event_name == 'push'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - os: macos-14
            rust-target: aarch64-apple-darwin
          - os: windows-2022
            rust-target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build & upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SKIP_DEVSERVER_CHECK: "true"
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
